<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shnoor Signup</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <nav class="navbar" >
        <div class="logo">
            <img src="./images/shnoor_international_logo.jpeg" alt="Shnoor">
        </div>
        <button class="menu-toggle" id="menuToggle">
            <i class="bi bi-list"></i>
        </button>
        <div class="nav-links " style="position: sticky; top: 0;"">
            <a href="./index.html">Home</a>
            <a href="./index.html">How It Works</a>
            <a href="./index.html">Features</a>
            <a href="./index.html">About</a>
            <a href="./index.html">Training</a>
            <a href="./index.html#contact">Contact</a>
        </div>
        <div class="nav-actions">
            <button id="themeToggle" class="icon-btn">
                <i class="bi bi-sun"></i>
            </button>
            <a href="./login.html" class="login">Log In</a>
            
        </div>
    </nav>
    <main>
        <div class="signup-card">
            <span class="badge">
                SYSTEM ACCESS
            </span>
            <h1 class="signup-title">
                Create Account
            </h1>
            <p class="signup-desc">
                Create your Shnoor LMS account.
            </p>
            <form id="signupForm" onsubmit="registerUser(event)">
                <label>FULL NAME</label>
                <div class="input-box">
                    <i class="bi bi-person"></i>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Enter your full name"
                        required>
                </div>
                <label>EMAIL ADDRESS</label>
                <div class="input-box">
                    <i class="bi bi-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>
                <label>PASSWORD</label>
                <div class="input-box">
                    <i class="bi bi-lock"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Create password"
                        required>
                </div>
                <label>CONFIRM PASSWORD</label>
                <div class="input-box">
                    <i class="bi bi-shield-lock"></i>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required>
                </div>
                <button type="submit" class="signup-btn">
                    Create Account
                </button>
            </form>
            <div class="signup-footer">
                Already have an account?
                <a href="login.html">
                    Sign In
                </a>
            </div>
        </div>
        <script src="script.js"></script>
    </main>
</body>
</html>
